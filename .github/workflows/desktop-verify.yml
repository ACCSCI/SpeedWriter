name: Desktop Verify

# PR/merge 触发的验证闸门
# 注:tag 触发不在这里(单独走 desktop-build.yml)
# v1.2:移除 Playwright/MiniMax key — 只验证 build + electron-builder 打包通畅
#      Playwright e2e 仅本地跑(见 scripts/verify-desktop.sh)
on:
  push:
    branches: [master, main, develop]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

# 并发:同 ref 同一 SHA 取消旧 run(避免同 PR 多次 push 浪费)
concurrency:
  group: desktop-verify-${{ github.workflow }}-${{ github.ref }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

# 顶层 permissions:read 即可(只读代码,无 release 操作)
permissions:
  contents: read

env:
  CSC_IDENTITY_AUTO_DISCOVERY: false  # 禁掉自动签名发现(我们本就不签名)

jobs:
  # ─── 打包验证:三平台 build + dist:dir,验证 electron-builder config 没坏 ───
  # 不跑 Playwright / 不读 MiniMax key(都挪到本地 scripts/verify-desktop.sh)
  packaging:
    name: Build + package (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # 三平台都跑 packaging:Mac 用 macos-14 而非 macos-latest:cache key 稳定
        os: [ubuntu-latest, windows-latest, macos-14]
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with: { version: 9 }

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22           # 跟 .nvmrc 对齐
          cache: pnpm

      - name: Cache Electron binaries
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/electron
            ~/Library/Caches/electron
            ~/AppData/Local/electron/Cache
          key: electron-${{ runner.os }}-${{ hashFiles('packages/desktop/package.json', 'packages/desktop/electron-builder.yml') }}
          restore-keys: electron-${{ runner.os }}-

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build core
        run: pnpm --filter @actalk/inkos-core build

      - name: Build studio
        run: pnpm --filter @actalk/inkos-studio build

      - name: Build desktop
        run: pnpm --filter @actalk/inkos-desktop build

      # Mac 需要先在 runner 上现场生成 icon.icns(sips 不支持 SVG,脚本用 qlmanage + sips)
      - name: Generate Mac icon
        if: runner.os == 'macOS'
        run: node scripts/generate-mac-icon.mjs

      # Windows 文件锁清理(防 d3dcompiler_47.dll "Access is denied")
      - name: Cleanup leftover InkOS process (Windows file lock workaround)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Get-Process InkOS,electron -ErrorAction SilentlyContinue | Stop-Process -Force
          if (Test-Path packages/desktop/dist/win-unpacked) {
            Remove-Item -Recurse -Force packages/desktop/dist/win-unpacked
          }
          if (Test-Path packages/desktop/dist/InkOS*.exe.blockmap) {
            Remove-Item -Force packages/desktop/dist/InkOS*.exe.blockmap
          }

      - name: Package (dist:dir, no installer)
        run: pnpm --filter @actalk/inkos-desktop dist:dir

      # 验证 dist 产物存在(各平台路径不同)
      - name: Verify packaged artifact exists
        shell: bash
        run: |
          case "${{ runner.os }}" in
            Windows)
              test -f "packages/desktop/dist/win-unpacked/InkOS.exe" || { echo "ERROR: InkOS.exe not found"; exit 1; }
              echo "OK: InkOS.exe found at packages/desktop/dist/win-unpacked/InkOS.exe"
              ;;
            macOS)
              test -d "packages/desktop/dist/mac/InkOS.app" || test -d "packages/desktop/dist/mac-arm64/InkOS.app" || { echo "ERROR: InkOS.app not found"; ls -la packages/desktop/dist/; exit 1; }
              echo "OK: InkOS.app found"
              ;;
            Linux)
              test -d "packages/desktop/dist/linux-unpacked" || { echo "ERROR: linux-unpacked not found"; ls -la packages/desktop/dist/; exit 1; }
              echo "OK: linux-unpacked found"
              ;;
          esac
