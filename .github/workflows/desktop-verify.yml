name: Desktop Verify

# PR/merge 触发的验证闸门
# 注:tag 触发不在这里(单独走 desktop-build.yml)
on:
  push:
    branches: [master, main, develop]
  pull_request:
    branches: [master, main]
  workflow_dispatch:
    inputs:
      mode:
        description: "Test mode (full / smoke / llm)"
        required: false
        default: full
        type: choice
        options: [full, smoke, llm]

# 并发:同 ref 同一 SHA 取消旧 run(避免同 PR 多次 push 浪费)
concurrency:
  group: desktop-verify-${{ github.workflow }}-${{ github.ref }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

# 顶层 permissions:read 即可(只读代码,无 release 操作)
permissions:
  contents: read

env:
  CSC_IDENTITY_AUTO_DISCOVERY: false  # 禁掉自动签名发现(我们本就不签名)

jobs:
  # ─── Smoke e2e:三平台都跑 ───
  smoke:
    name: Smoke e2e (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # 三平台都跑 smoke:验证主进程能起、Hono 子进程能连
        # Mac 用 macos-14 而非 macos-latest:cache key 稳定(见 GITHUB_ACTIONS_DESKTOP.md 8.2)
        os: [ubuntu-latest, windows-latest, macos-14]
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with: { version: 9 }

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22           # 跟 .nvmrc 对齐
          cache: pnpm

      - name: Cache Electron binaries
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/electron
            ~/Library/Caches/electron
            ~/AppData/Local/electron/Cache
          key: electron-${{ runner.os }}-${{ hashFiles('packages/desktop/package.json', 'packages/desktop/electron-builder.yml') }}
          restore-keys: electron-${{ runner.os }}-

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build core
        run: pnpm --filter @actalk/inkos-core build

      - name: Build studio
        run: pnpm --filter @actalk/inkos-studio build

      - name: Build desktop
        run: pnpm --filter @actalk/inkos-desktop build

      - name: Package (dir only, smoke 不出 installer)
        run: pnpm --filter @actalk/inkos-desktop dist:dir

      - name: Install Playwright browsers
        run: pnpm --filter @actalk/inkos-desktop exec playwright install --with-deps chromium

      # P-新:Windows 文件锁清理(防 d3dcompiler_47.dll "Access is denied")
      - name: Cleanup leftover InkOS process (Windows file lock workaround)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Get-Process InkOS,electron -ErrorAction SilentlyContinue | Stop-Process -Force
          if (Test-Path packages/desktop/dist/win-unpacked) {
            Remove-Item -Recurse -Force packages/desktop/dist/win-unpacked
          }
          if (Test-Path packages/desktop/dist/InkOS*.exe.blockmap) {
            Remove-Item -Force packages/desktop/dist/InkOS*.exe.blockmap
          }

      - name: Run smoke e2e
        run: pnpm --filter @actalk/inkos-desktop test:smoke

      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-failures-${{ matrix.os }}
          path: packages/desktop/test-results/
          retention-days: 7

  # ─── LLM e2e:可选,仅当仓库配了 INKOS_LLM_API_KEY secret ───
  # v1.1 关键变更:不强制依赖 key
  # - 没配 secret:skip_guard step 检测后 print notice,job 标绿但不跑 llm 测试
  # - 配了 secret:完整跑真实 MiniMax 调用
  # - 不论哪种情况,smoke 仍跑全平台
  #
  # 关键 fix:GitHub Actions 表达式不允许在 if 里直接读 secrets.X
  # 解法:把 secret 守门放到 step 内部,读 env.INKOS_LLM_API_KEY 判断(env 是允许的)
  llm:
    name: LLM e2e (ubuntu only, requires INKOS_LLM_API_KEY secret)
    runs-on: ubuntu-latest
    needs: smoke
    # job-level 只守 event 类型(secrets.X 不允许在 if 表达式里读)
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/')
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: pnpm }
      - name: Cache Electron
        uses: actions/cache@v4
        with:
          path: ~/.cache/electron
          key: electron-ubuntu-llm-${{ hashFiles('packages/desktop/package.json', 'packages/desktop/electron-builder.yml') }}
          restore-keys: electron-ubuntu-llm-
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @actalk/inkos-core build
      - run: pnpm --filter @actalk/inkos-studio build
      - run: pnpm --filter @actalk/inkos-desktop build
      - run: pnpm --filter @actalk/inkos-desktop dist:dir
      - run: pnpm --filter @actalk/inkos-desktop exec playwright install --with-deps chromium

      # 守门:把 secret 注入 env,env 是空串则 print notice(后续 step 不会跑)
      # env.X 是允许的,因为 env 是该 step 注入的,不是直接读 secrets
      - name: Skip LLM (no INKOS_LLM_API_KEY secret configured)
        if: env.INKOS_LLM_API_KEY == ''
        env:
          INKOS_LLM_API_KEY: ${{ secrets.INKOS_LLM_API_KEY }}
        run: |
          echo "::notice title=LLM e2e skipped::INKOS_LLM_API_KEY secret not configured — skipping LLM e2e (本机 .env 有 key 仍可本地跑 test:llm)"

      - name: Run LLM e2e
        if: env.INKOS_LLM_API_KEY != ''
        env:
          INKOS_LLM_API_KEY: ${{ secrets.INKOS_LLM_API_KEY }}
          INKOS_LLM_BASE_URL: ${{ vars.INKOS_LLM_BASE_URL || 'https://api.minimaxi.com/v1' }}
          INKOS_LLM_MODEL: ${{ vars.INKOS_LLM_MODEL || 'MiniMax-Text-01' }}
        run: |
          {
            echo "INKOS_LLM_API_KEY=$INKOS_LLM_API_KEY"
            echo "INKOS_LLM_BASE_URL=$INKOS_LLM_BASE_URL"
            echo "INKOS_LLM_MODEL=$INKOS_LLM_MODEL"
          } > .env
          pnpm --filter @actalk/inkos-desktop test:llm
