appId: com.actalk.inkos
productName: InkOS
copyright: Copyright © 2026 InkOS
asar: true
# ⚠️ 关键:必须把子进程入口从 asar 里拆出来
#   - dist/main/server/entry.js → spawn() 直接执行,不能压缩
asarUnpack:
  - "dist/main/server/entry.js"

# electron-builder 25+ 需要 publish provider(否则 createUpdateInfoTasks 读 .provider 崩)
# 我们不自动发布(--publish never),这里只给 metadata 用
publish:
  provider: github
  releaseType: release
directories:
  buildResources: build
  output: dist
# 极简白名单:只列我们真正需要打进 asar 的文件
# core/studio 已被 esbuild 打进 entry.js,不需要再包含
# 不依赖 workspace symlink(electron-builder 不解析 symlink 跨包)
files:
  - "package.json"
  - "dist/main/index.js"
  - "dist/main/window.js"
  - "dist/main/server.js"
  - "dist/main/ipc.js"
  - "dist/main/safe-storage.js"
  - "dist/main/user-data.js"
  - "dist/main/update-checker.js"
  - "dist/main/single-instance.js"
  - "dist/main/menu.js"
  - "dist/main/logger.js"
  - "dist/main/debug.js"
  - "dist/main/server/entry.js"
  - "dist/preload/index.js"
  - "!**/*.{md,markdown}"
  - "!**/{__tests__,test,tests,examples,docs}/**"
  - "!**/*.{map,d.ts}"
extraResources:
  - from: "../studio/dist"
    to: "studio-dist"
    filter: ["**/*"]
  - from: "../core/genres"
    to: "core-genres"
    filter: ["**/*.md"]

# === Mac ===
mac:
  category: public.app-category.productivity
  target:
    - target: dmg
      arch: [x64, arm64]
    - target: zip
      arch: [x64, arm64]
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  # 正式分发时打开签名 + 公证(需 Apple Developer ID,$99/年):
  #   export CSC_LINK="$HOME/DeveloperID_Application.p12"
  #   export CSC_KEY_PASSWORD='p12-password'
  #   export APPLE_ID='you@apple.com'
  #   export APPLE_APP_SPECIFIC_PASSWORD='abcd-efgh-ijkl-mnop'
  #   export APPLE_TEAM_ID='ABCDE12345'
  # notarizeWith: 'electron-builder-notarize'  # 或直接用 notarytool
  # 当前 CI 用 CSC_IDENTITY_AUTO_DISCOVERY=false,产物未签名 → Gatekeeper 首次需右键"打开"

# === Windows ===
win:
  target:
    - target: nsis
      arch: [x64]
    - target: portable
      arch: [x64]

# === Linux ===
linux:
  target:
    - target: AppImage
      arch: [x64]
    - target: deb
      arch: [x64]
  category: Office

# .deb artifactName 必须用 ${productName} 而非 ${name}
# 否则 fpm 写入路径含 scoped npm 前缀 @actalk/,子目录不存在 → 失败
# 默认 deb 输出:dist/@actalk/inkos-desktop_1.5.0_amd64.deb ❌
# 期望输出:dist/InkOS_1.5.0_amd64.deb ✓
deb:
  artifactName: ${productName}_${version}_${arch}.${ext}

# === NSIS ===
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: InkOS
  installerLanguages: ["en_US", "zh_CN", "ja_JP"]

# === DMG ===
# icon.icns 是由 scripts/generate-mac-icon.mjs 在 macOS 上从 assets/logo.svg 生成的
# (本地不入仓、CI 在 macos-14 runner 上跑);其他平台开发时 dmg.icon 缺失不阻塞 Win/Linux 打包
dmg:
  title: "${productName} ${version}"
  icon: build/icon.icns
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications
